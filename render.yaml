services:
  # 1. Backend Web Service (Node.js Express App)
  - type: web
    name: sketchforge-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false # Set your MongoDB Connection string in the Render Dashboard env settings
      - key: JWT_SECRET
        generateValue: true # Render will generate a random secure key automatically
      - key: CLIENT_ORIGIN
        fromService:
          type: web
          name: sketchforge-frontend
          property: url

  # 2. Frontend Static Site (Vite React Client)
  - type: web
    name: sketchforge-frontend
    env: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      # Rewrite rule to route all requests to index.html to support React SPA client-side routing
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: sketchforge-backend
          property: url
